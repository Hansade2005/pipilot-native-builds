<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- PiPilot Desktop (Native engine) brand mark — placeholder for the dedicated Native logo.
       Dark rounded-square tile + amber gradient "forward P" monogram. Crisp at small sizes. -->
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#14141b"/>
      <stop offset="1" stop-color="#08080c"/>
    </linearGradient>
    <linearGradient id="amber" x1="320" y1="240" x2="720" y2="820" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffcf6b"/>
      <stop offset="0.5" stop-color="#f6a723"/>
      <stop offset="1" stop-color="#e5850b"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="64" y="64" width="896" height="896" rx="208" fill="url(#tile)"/>
  <rect x="64.5" y="64.5" width="895" height="895" rx="207.5" fill="none" stroke="#2a2a36" stroke-width="1"/>

  <g filter="url(#glow)">
    <!-- Stylized "P": stem + forward-leaning bowl (chevron) suggesting a native/forward engine. -->
    <path d="M356 268 h96 v488 h-96 z" fill="url(#amber)"/>
    <path d="M452 268 h150 a150 150 0 0 1 0 300 h-150 v-96 h150 a54 54 0 0 0 0 -108 h-150 z" fill="url(#amber)"/>
    <!-- forward spark -->
    <path d="M604 596 l108 84 l-108 84 v-56 l36 -28 l-36 -28 z" fill="url(#amber)" opacity="0.9"/>
  </g>
</svg>
