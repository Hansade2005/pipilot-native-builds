name: Build Shells

# Builds the generic PiPilot desktop shell (a Native SDK WebView app that loads
# NATIVE_SDK_FRONTEND_URL) for macOS / Linux / Windows on GitHub's free public-repo
# runners, and attaches the artifacts to a Release. One binary per OS wraps ANY
# deployed *.pipilot.dev app — no per-app build.
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }} shell
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: macos
            artifact: pipilot-shell-macos
          - os: ubuntu-latest
            target: linux
            artifact: pipilot-shell-linux
          - os: windows-latest
            target: windows
            artifact: pipilot-shell-windows
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Pin the SDK's Zig toolchain so the CLI reuses PATH zig. If removed, the CLI
      # auto-fetches 0.16.0 into ~/.native/toolchains on first run.
      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"

      # web_engine = "system" -> the SDK's Linux host links GTK4 + WebKitGTK 6.0
      # (gtk_host.c: -lgtk4 -lwebkitgtk-6.0), resolved via pkg-config. macOS
      # (WKWebView) + Windows (bundled WebView2) need no extra system packages.
      - name: Install Linux WebView deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev pkg-config

      - name: Install Native SDK CLI
        run: npm install -g @native-sdk/cli@0.5.4

      - name: Doctor (diagnostic, non-fatal)
        run: native doctor || true

      - name: Validate manifest
        run: native validate

      - name: Build (ReleaseFast)
        run: native build

      - name: Package
        run: native package --target ${{ matrix.target }} --output out

      # Embed the icon into the Windows exe so the title-bar + taskbar show it at
      # runtime (native package only writes app-icon.ico as a sidecar).
      - name: Embed exe icon (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          if (Test-Path "out\app-icon.ico") { npx --yes rcedit "out\bin\pipilot-shell.exe" --set-icon "out\app-icon.ico" }

      - name: Archive (macOS / Linux)
        if: matrix.os != 'windows-latest'
        run: |
          cd out
          tar -czf "../${{ matrix.artifact }}.tar.gz" .
      - name: Archive (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: Compress-Archive -Path out/* -DestinationPath "${{ matrix.artifact }}.zip"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip
          if-no-files-found: ignore

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
